name: Documentation

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

# Needed for Documenter to push to gh-pages and to comment preview links on PRs.
permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate docs environment
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        # deploy via the built-in token
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}    # or an SSH deploy key, if set
        run: julia --project=docs docs/make.jl
